name: Check for new judgments

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC = 09:00 EET (UTC+2) / 10:00 EEST (UTC+3)
  workflow_dispatch: # allows manual trigger from the GitHub Actions tab

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to commit seen_judgments.json back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python riigikohus_bot.py

      - name: Commit updated state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_judgments.json
          git diff --cached --quiet || git commit -m "chore: update seen_judgments.json [skip ci]"
          git push
